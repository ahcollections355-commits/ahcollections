<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AH Collections</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}
body{margin:0;font-family:Poppins;background:#fff;}
.hidden{display:none;}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  border-bottom:1px solid #f0e8d0;
}
.logo{font-family:Playfair Display;font-size:26px;color:#D4AF37;}
.nav a{margin-left:20px;cursor:pointer;text-decoration:none;color:black;font-size:14px;}

/* HERO */
.hero{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  padding:40px;
}
.hero img{
  width:100%;
  max-width:400px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:30px;
  padding:50px 100px;
}

/* CARD */
.card{
  border:1px solid #eee;
  padding:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}
.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
}
.card:hover{transform:scale(1.05);}

/* BUTTON */
.btn{
  padding:10px 20px;
  border:1px solid #D4AF37;
  background:none;
  color:#D4AF37;
  cursor:pointer;
}
.btn:hover{
  background:#D4AF37;
  color:#fff;
}

/* CENTER BOX */
.center-box{
  max-width:600px;
  margin:50px auto;
  text-align:center;
  padding:0 20px;
}

/* TRUST BAR */
.trust-bar{
  display:flex;
  justify-content:center;
  gap:40px;
  padding:25px;
  flex-wrap:wrap;
}

/* RESPONSIVE */

/* Tablet */
@media (max-width:1024px){
  .grid{grid-template-columns:repeat(2,1fr);padding:30px;}
  .hero{flex-direction:column;text-align:center;}
  .nav{padding:15px 20px;}
}

/* Mobile */
@media (max-width:600px){

  .nav{
    flex-direction:column;
    gap:10px;
  }

  .logo{font-size:22px;}

  .nav a{
    margin:0 10px;
    font-size:13px;
  }

  .hero{
    flex-direction:column;
    padding:20px;
  }

  .grid{
    grid-template-columns:1fr;
    padding:20px;
    gap:20px;
  }

  .trust-bar{
    flex-direction:column;
    gap:15px;
  }

  .btn{
    width:100%;
    max-width:250px;
  }
}
</style>

<script>
let cart=[];

function showPage(p){
  ["home","shop","products","cartPage"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(p).classList.remove("hidden");
}

function addToCart(name){
  cart.push(name);
  document.getElementById("cartCount").innerText=cart.length;
}

function openCategory(name){
  let content=`<h1 style="text-align:center;">${name}</h1><div class="grid">`;

  for(let i=1;i<=6;i++){
    content+=`
    <div class="card">
      <img src="https://via.placeholder.com/300">
      <p>${name} Item ${i}</p>
      <p>₹499</p>
      <button class="btn" onclick="addToCart('${name} ${i}')">ADD</button>
    </div>`;
  }

  content+=`</div>`;
  document.getElementById("products").innerHTML=content;
  showPage("products");
}

function showCart(){
  let html="";
  cart.forEach(item=>{
    html+=`<p>${item}</p>`;
  });
  document.getElementById("cartItems").innerHTML=html;
  showPage("cartPage");
}
</script>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="logo">AH COLLECTIONS</div>
  <div>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('shop')">Shop</a>
    <a onclick="showCart()">Cart (<span id="cartCount">0</span>)</a>
  </div>
</div>

<!-- HOME -->
<div id="home">
  <div class="hero">
    <img src="https://via.placeholder.com/400">
    <div>
      <h1>Shop Your Favourites</h1>
      <p>Elegant & timeless pieces</p>
      <button class="btn" onclick="showPage('shop')">Shop Now</button>
    </div>
  </div>

  <h2 style="text-align:center;">Our Collections</h2>
  <div class="grid">
    <div class="card" onclick="openCategory('Chains')"><img src="https://via.placeholder.com/300"><p>Chains</p></div>
    <div class="card" onclick="openCategory('Bracelets')"><img src="https://via.placeholder.com/300"><p>Bracelets</p></div>
    <div class="card" onclick="openCategory('Earrings')"><img src="https://via.placeholder.com/300"><p>Earrings</p></div>
    <div class="card" onclick="openCategory('Bangles')"><img src="https://via.placeholder.com/300"><p>Bangles</p></div>
  </div>
</div>

<!-- SHOP -->
<div id="shop" class="hidden">
  <h2 style="text-align:center;">Collections</h2>
  <div class="grid">
    <div class="card" onclick="openCategory('Chains')"><p>Chains</p></div>
    <div class="card" onclick="openCategory('Bracelets')"><p>Bracelets</p></div>
    <div class="card" onclick="openCategory('Earrings')"><p>Earrings</p></div>
    <div class="card" onclick="openCategory('Bangles')"><p>Bangles</p></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="hidden"></div>

<!-- CART -->
<div id="cartPage" class="hidden">
  <div class="center-box">
    <h2>Cart</h2>
    <div id="cartItems"></div>
  </div>
</div>

</body>
</html>
